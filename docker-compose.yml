# nanobot webui — standalone Docker Compose
services:
  webui:
    image: kangkang223/nanobot-webui:latest
    container_name: nanobot-webui
    environment:
      - WEBUI_PORT=18780          # HTTP port
      - WEBUI_HOST=0.0.0.0        # Bind address
      - WEBUI_LOG_LEVEL=INFO      # DEBUG / INFO / WARNING / ERROR
      # - WEBUI_WORKSPACE=/root/.nanobot/workspace
      # - WEBUI_CONFIG=/root/.nanobot/config.json
      # - WEBUI_ONLY=true         # Skip IM channels (external nanobot process)
    volumes:
      - ~/.nanobot:/root/.nanobot
    ports:
      - "18780:18780"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:18780/', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
